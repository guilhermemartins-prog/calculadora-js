<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <script src="js/calc.js" defer></script>
    <link
      rel="shortcut icon"
      href="assets/calculadora.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="dflex">
      <div class="calc dflex" id="calc">
        <div class="nome dflex" id="nome">
          <p>Calculadora</p>
        </div>
        <div class="div_display dflex" id="div_display">
          <p class="display" id="display">0</p>
        </div>

        <div class="div_teclas dflex" id="div_teclas">
          <button class="tecla teclaOp" id="tcls">CLS</button>
          <button class="tecla num" id="t(">(</button>
          <button class="tecla num" id="t)">)</button>
          <button class="tecla teclaOp clear" id="tap">
            <img src="assets/remove.png" width="28" height="28" alt="apagar" />
          </button>
          <button class="tecla num" id="t7">7</button>
          <button class="tecla num" id="t8">8</button>
          <button class="tecla num" id="t9">9</button>
          <button class="tecla op teclaOp" id="ta">+</button>
          <button class="tecla num" id="t4">4</button>
          <button class="tecla num" id="t5">5</button>
          <button class="tecla num" id="t6">6</button>
          <button class="tecla op teclaOp" id="ts">-</button>
          <button class="tecla num" id="t1">1</button>
          <button class="tecla num" id="t2">2</button>
          <button class="tecla num" id="t3">3</button>
          <button class="tecla op teclaOp" id="tm">x</button>
          <button class="tecla num" id="t0">0</button>
          <button class="tecla num" id="tdc">,</button>
          <button class="tecla res teclaOp" id="tig">=</button>
          <button class="tecla op teclaOp" id="td">/</button>
        </div>
      </div>
    </div>
  </body>
</html>
